<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup_Form</title>
    <link rel="stylesheet" href="Login_signup.css">
    <link rel="stylesheet"href="https://fonts.googleapis.com/css?family=Poppins">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1 class="title">Sign Up</h1>
            <div class="underline"></div>
            <form>
                <div class="input-group">
                    <!-- Name_input -->
                <div class="input-fieald namefield">
                    <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="Name">
                    </div>
                    <!-- Email_input -->
                     <div class="input-field">
                     <i class="fa-solid fa-at"></i>
                        <input type="email" placeholder="Email">
                     </div>
                     <!-- Password -->
                      <div class="input-field">
                       <i class="fa-solid fa-unlock"></i>
                        <input type="password" placeholder="password">
                      </div>
                <p>Password Suggestions <a href="#">Click Here!</a></p>                     
                </div>
                <div class="btn-field">
                    <button type="button" class="signinbtn">Sign up</button>
                    <button type="button" class="disable signinbtn">Sign in</button>
                </div>
            </form>

        </div>

    </div>
    <script src="Login_signup.js"></script>
<body>
</html>
